    <linearGradient id="wordmark" x1="470" y1="120" x2="900" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9ff3d8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bgGlow)"/>

  <!-- ===== eye mark, centered around (190,180) ===== -->
  <g transform="translate(80,70)">
