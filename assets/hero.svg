  <!-- ===== wordmark ===== -->
  <text x="360" y="175" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="104" font-weight="800" fill="url(#wordmark)" letter-spacing="-2">Iris</text>
  <text x="364" y="222" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="600" fill="#34d399">god-mode for your home network</text>
  <text x="364" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#5b6472">every device · live status · new-device alerts · zero router login</text>
