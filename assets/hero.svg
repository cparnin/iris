<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Iris — god-mode for your home network">
  <defs>
    <radialGradient id="bgGlow" cx="26%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0e2a2a"/>
      <stop offset="100%" stop-color="#0a0b0f"/>
    </radialGradient>
    <radialGradient id="iris2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="55%" stop-color="#0ea5a4"/>
      <stop offset="100%" stop-color="#0b3b3a"/>
    </radialGradient>
    <linearGradient id="sweep2" x1="190" y1="180" x2="300" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.85"/>
