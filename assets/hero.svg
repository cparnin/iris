    <circle cx="110" cy="110" r="48" stroke="#243244" stroke-width="1.5"/>
    <path d="M110 110 L210 110 A100 100 0 0 0 178 39 Z" fill="url(#sweep2)"/>
    <path d="M14 110 Q110 26 206 110 Q110 194 14 110 Z" stroke="#34d399" stroke-width="3.5" fill="none" opacity="0.85"/>
    <circle cx="110" cy="110" r="44" fill="url(#iris2)"/>
    <circle cx="110" cy="110" r="44" stroke="#34d399" stroke-width="2" opacity="0.6"/>
    <line x1="110" y1="110" x2="156" y2="74" stroke="#7dd3fc" stroke-width="1.5" opacity="0.7"/>
    <line x1="110" y1="110" x2="64" y2="84" stroke="#7dd3fc" stroke-width="1.5" opacity="0.7"/>
    <line x1="110" y1="110" x2="138" y2="152" stroke="#7dd3fc" stroke-width="1.5" opacity="0.7"/>
    <line x1="110" y1="110" x2="78" y2="148" stroke="#7dd3fc" stroke-width="1.5" opacity="0.7"/>
    <circle cx="156" cy="74" r="5.5" fill="#7dd3fc"/>
    <circle cx="64" cy="84" r="5.5" fill="#7dd3fc"/>
    <circle cx="138" cy="152" r="5.5" fill="#7dd3fc"/>
    <circle cx="78" cy="148" r="5.5" fill="#7dd3fc"/>
    <circle cx="110" cy="110" r="16" fill="#0a0b0f" stroke="#34d399" stroke-width="2.5"/>
    <circle cx="110" cy="110" r="6" fill="#34d399"/>
