<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Polaris logo">
  <defs>
    <radialGradient id="starCore" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="38%" stop-color="#9ff3d8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5ff0b8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5ff0b8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="220" height="220" rx="44" fill="#0a0b0f"/>

  <!-- concentric orbit rings -->
  <circle cx="110" cy="110" r="86" stroke="#1f2937" stroke-width="1.5"/>
  <circle cx="110" cy="110" r="64" stroke="#1f2937" stroke-width="1.5"/>
  <circle cx="110" cy="110" r="42" stroke="#243244" stroke-width="1.5"/>

  <!-- orbiting device nodes + links (the "network" around the star), tucked
       into the diagonal gaps between the star's points -->
  <g opacity="0.85">
    <line x1="110" y1="110" x2="161" y2="59" stroke="#7dd3fc" stroke-width="1.5" opacity="0.6"/>
    <line x1="110" y1="110" x2="59" y2="59" stroke="#7dd3fc" stroke-width="1.5" opacity="0.6"/>
    <line x1="110" y1="110" x2="161" y2="161" stroke="#7dd3fc" stroke-width="1.5" opacity="0.6"/>
    <line x1="110" y1="110" x2="59" y2="161" stroke="#7dd3fc" stroke-width="1.5" opacity="0.6"/>
    <circle cx="161" cy="59" r="5" fill="#7dd3fc"/>
    <circle cx="59" cy="59" r="5" fill="#7dd3fc"/>
    <circle cx="161" cy="161" r="5" fill="#7dd3fc"/>
    <circle cx="59" cy="161" r="5" fill="#7dd3fc"/>
  </g>

  <!-- glow halo behind the star -->
  <circle cx="110" cy="110" r="72" fill="url(#halo)"/>

  <!-- Polaris: a four-point navigational north star with concave edges -->
  <path d="M110 18
           C114 92 118 106 202 110
           C118 114 114 128 110 202
           C106 128 102 114 18 110
           C102 106 106 92 110 18 Z"
        fill="url(#starCore)"/>

  <!-- bright core -->
  <circle cx="110" cy="110" r="8.5" fill="#ffffff"/>
</svg>
